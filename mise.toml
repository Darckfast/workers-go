experimental_monorepo_root=true

[tools]
go = "1.24"
golangci-lint = "v2.12.2"
node = "24"
pnpm = "11"

[env]
MISE_EXPERIMENTAL=true

[monorepo]
config_roots = [
    "_apps/*",
]

[tasks.install]
run = "go mod download"

[tasks.test-integration]
depends = ["install"]
run = """
#!/usr/bin/env bash
go install codeberg.org/darckfast/workers-go/cmd/workers-go
if [ "$1" = "--tiny" ]; then
  mise //_apps/_worker:prepare --tiny
  workers-go -i ./_apps/_worker/pkg -o ./_apps/_worker/bin -ex ./_apps/_worker/durable_objects -tiny
else
  mise //_apps/_worker:prepare
  workers-go -i ./_apps/_worker/pkg -o ./_apps/_worker/bin -ex ./_apps/_worker/durable_objects
fi
mise //_apps/_worker:test
"""

[tasks.test-lib]
depends = ["install"]
run = """
#!/usr/bin/env bash
if [ "$1" = "--tiny" ]; then
  GOOS=js GOARCH=wasm tinygo test -timeout 500ms -bench=. ./...
else
  go test -timeout 60000ms ./cmd/... && \
  GOOS=js GOARCH=wasm go test -exec=$(go env GOROOT)/lib/wasm/go_js_wasm_exec -timeout 500ms ./... | grep -v '\\[no test files\\]'
fi
"""

[tasks.bench]
depends = ["install"]
run = """
#!/usr/bin/env bash
if [ "$1" = "--tiny" ]; then
  GOOS=js GOARCH=wasm tinygo test -timeout 500ms -bench=. ./... | grep -v '\\[no test files\\]'
else
  GOOS=js GOARCH=wasm go test -exec=$(go env GOROOT)/lib/wasm/go_js_wasm_exec -timeout 500ms -bench=. ./... | grep -v '\\[no test files\\]'
fi
"""

[tasks.lint]
run = "GOOS=js GOARCH=wasm golangci-lint run"
