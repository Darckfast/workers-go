  test-worker:
    name: Test Worker
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise test

  test-go:
    name: Test Go
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise test:go

