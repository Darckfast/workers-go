name: PR Tests
on: [pull_request]

env:
  GOOS: js
  GOARCH: wasm
  MISE_EXPERIMENTAL: true

jobs:
  test-bun:
    name: Test Bun
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "/root/.local/bin" >> $GITHUB_PATH
      - run: mise //_apps/_bun:test

  test-deno:
    name: Test Deno
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "/root/.local/bin" >> $GITHUB_PATH
      - run: mise //_apps/_deno:test

  test-hono:
    name: Test Hono
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "/root/.local/bin" >> $GITHUB_PATH
      - run: mise //_apps/_hono:test
  test-uws:
