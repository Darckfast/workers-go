name: PR Tests
on: [pull_request]

env:
  GOOS: js
  GOARCH: wasm

jobs:
  test-bun:
    name: Test Bun
    needs: setup
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            deps-
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise bun

  test-deno:
    name: Test Deno
    needs: setup
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            deps-
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise deno test

  test-hono:
    name: Test Hono
    needs: setup
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            deps-
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise hono test

  test-uws:
    name: Test uWS
    needs: setup
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            deps-
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise uws test

  test-worker:
    name: Test Worker
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: deps-${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            deps-
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise test

  test-go:
    name: Test Go
    runs-on: codeberg-small-lazy
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
      - run: /root/.local/bin/mise test:go

